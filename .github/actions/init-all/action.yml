name: 'Initialization Action'
description: 'Common initialization steps for CI jobs'
inputs:
  python-version-file:
    description: 'Python version file to setup'
    required: false
  node-version-file:
    description: 'Node version file to setup'
    required: false
  install-node-modules:
    description: 'Whether to install Node.js modules using "make node_modules"'
    required: false
    default: 'true'
  protoc:
    description: 'Whether to install protoc'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    ## Set up Python
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.7.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/requirements*.txt
          **/uv.lock
      if: ${{ inputs.python-version-file }}

    ## Set up Node environment
    - name: Remove classic Yarn on Windows so that it does not conflict with Corepack.
      if: ${{ runner.os == 'Windows' && inputs.node-version-file }}
      run: npm uninstall -g yarn
      shell: bash

    - name: Enable Corepack
      run: corepack enable
      shell: bash
    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: ${{ inputs.node-version-file }}
      if: ${{ inputs.node-version-file }}

    # `actions/setup-node`'s cache option doesn't work well with corepack.
    - name: Get Yarn cache directory path
      id: yarn-cache-path
      run: echo "path=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      shell: bash
      if: ${{ inputs.node-version-file }}
    - name: Cache Yarn global dependencies
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ steps.yarn-cache-path.outputs.path }}
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-
      if: ${{ inputs.node-version-file }}

    # We require protoc >= 3.20, but Ubuntu 22.04 - the OS that these Github
    # Actions are running as of 2024.06.04 - doesn't have recent versions
    # of protoc in its package repository. To work around this, we
    # install the latest version from the protobuf release page.
    # Ref: https://github.com/streamlit/streamlit/blob/52736534b6488da3bcb0c9d8bba855855a963678/.github/actions/make_init/action.yml#L32-L45
    # Our workflow below follows https://grpc.io/docs/protoc-installation/#install-pre-compiled-binaries-any-os
    - name: Install `protoc` binary
      run: |
        working_dir=${{ runner.temp }}/protoc
        mkdir -p $working_dir
        pushd $working_dir

        PB_REL="https://github.com/protocolbuffers/protobuf/releases"
        PROTOC_VERSION=26.1
        curl -LO $PB_REL/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
        unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d $HOME/.local
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        protoc --version

        popd
        rm -rf $working_dir
      shell: bash
      if: ${{ inputs.protoc == 'true' }}

    # Install Aikido Safe-Chain to transparently gate `yarn install` / `uv sync`
    # against malicious npm/PyPI packages. The `setup-ci` command installs
    # executable shims under ~/.safe-chain/shims that route through a local
    # proxy checking Aikido Intel. Pinned to an immutable version + SHA256
    # because this is a supply-chain security control.
    # Docs: https://github.com/AikidoSec/safe-chain
    - name: Install Aikido Safe-Chain (Linux)
      if: runner.os == 'Linux'
      env:
        SAFE_CHAIN_VERSION: "1.4.9"
        SAFE_CHAIN_SHA256: "4d853d1c3d117c3f1eb1c48eaf6cb98f9a936f3694ffa0c941a92b398b9ac55c"
      run: |
        set -euo pipefail
        install_dir="${HOME}/.safe-chain/bin"
        binary="${install_dir}/safe-chain"
        mkdir -p "${install_dir}"
        curl -fsSL --proto "=https" --tlsv1.2 -o "${binary}" \
          "https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/safe-chain-linuxstatic-x64"
        echo "${SAFE_CHAIN_SHA256}  ${binary}" | sha256sum -c -
        chmod +x "${binary}"
        "${binary}" setup-ci
        echo "${HOME}/.safe-chain/shims" >> "${GITHUB_PATH}"
        echo "${install_dir}" >> "${GITHUB_PATH}"
      shell: bash

    - name: Install Aikido Safe-Chain (Windows)
      if: runner.os == 'Windows'
      env:
        SAFE_CHAIN_VERSION: "1.4.9"
        SAFE_CHAIN_SHA256: "15553aba2593fea715ba9c0848176699e96ecafbb331c9e064a04e244e29fb32"
      run: |
        $ErrorActionPreference = 'Stop'
        $installDir = Join-Path $env:USERPROFILE '.safe-chain\bin'
        $shimsDir  = Join-Path $env:USERPROFILE '.safe-chain\shims'
        $binary    = Join-Path $installDir 'safe-chain.exe'
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null
        Invoke-WebRequest -UseBasicParsing `
          -Uri "https://github.com/AikidoSec/safe-chain/releases/download/$env:SAFE_CHAIN_VERSION/safe-chain-win-x64.exe" `
          -OutFile $binary
        $actualHash = (Get-FileHash -Algorithm SHA256 -Path $binary).Hash.ToLower()
        if ($actualHash -ne $env:SAFE_CHAIN_SHA256) {
          throw "SHA256 mismatch for safe-chain.exe: expected $($env:SAFE_CHAIN_SHA256), got $actualHash"
        }
        & $binary setup-ci
        Add-Content -Path $env:GITHUB_PATH -Value $shimsDir
        Add-Content -Path $env:GITHUB_PATH -Value $installDir
      shell: pwsh

    - name: Set up Python packages
      run: make venv
      shell: bash
      if: ${{ inputs.python-version-file }}

    - name: Set up Node packages
      run: make node_modules
      shell: bash
      if: ${{ inputs.node-version-file && inputs.install-node-modules == 'true' }}
