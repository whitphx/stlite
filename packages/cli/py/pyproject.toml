[project]
name = "stlite-cli"
version = "0.0.0"
description = "Command-line tools for Stlite"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
authors = [
  { name = "Yuichiro Tachibana (Tsuchiya)", email = "t.yic.yt@gmail.com" },
]
dependencies = ["click>=8.1"]

[project.scripts]
stlite = "stlite_cli.cli:main"

[dependency-groups]
dev = ["pyright>=1.1.384", "pytest>=8.3.3", "ruff>=0.6.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff.lint]
extend-select = ["I"]

[tool.pyright]
include = ["stlite_cli"]
