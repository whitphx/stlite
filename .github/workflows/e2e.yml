name: E2E Tests

on:
  # This workflow runs in the PR's own context (native `pull_request` trigger),
  # so it executes PR code with a read-only `GITHUB_TOKEN` and no repository secrets.
  # It polls for the corresponding `Test and Build` run on the same commit and
  # downloads its artifacts to test against the PR's built packages.
  # This file must NEVER reference deployment/publish secrets — `postbuild.yml` is
  # the only workflow permitted to hold those.
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

env:
  node-version-file: ".nvmrc"

permissions: {}

jobs:
  wait-for-build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      run-id: ${{ steps.poll.outputs.run-id }}
    steps:
      - name: Poll Test and Build workflow for the same commit
        id: poll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # For pull_request events, `gh run list --commit` indexes runs by the
          # PR head SHA, not by `github.sha` (which is the merge commit).
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 3600))  # 60 min
          while [ $SECONDS -lt $deadline ]; do
            row=$(gh run list --repo "$REPO" \
                    --workflow=test-build.yml \
                    --commit="$COMMIT_SHA" \
                    --limit 1 \
                    --json databaseId,status,conclusion \
                    --jq '.[0] // empty')
            if [ -n "$row" ]; then
              status=$(jq -r '.status' <<<"$row")
              conclusion=$(jq -r '.conclusion' <<<"$row")
              run_id=$(jq -r '.databaseId' <<<"$row")
              echo "status=$status conclusion=$conclusion run_id=$run_id"
              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "run-id=$run_id" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
                echo "Test and Build for $COMMIT_SHA concluded with '$conclusion'" >&2
                exit 1
              fi
            else
              echo "No Test and Build run found for $COMMIT_SHA yet"
            fi
            sleep 30
          done
          echo "Timed out waiting for Test and Build on $COMMIT_SHA" >&2
          exit 1

  e2e-browser:
    needs: wait-for-build

    permissions:
      contents: read

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.node-version-file }}

      - name: Set up the e2e-tests environment
        run: |
          yarn install
          yarn install:browsers
        working-directory: packages/browser/e2e-tests

      - name: Build demos
        run: yarn build:demo
        working-directory: packages/browser/e2e-tests
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stlite-browser
          path: ${{ runner.temp }}/artifacts/browser
          run-id: ${{ needs.wait-for-build.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: tar xzvf package.tgz
        working-directory: ${{ runner.temp }}/artifacts/browser

      - name: Run the e2e-tests
        run: yarn test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        working-directory: packages/browser/e2e-tests
        env:
          BUILD_DIR: ${{ runner.temp }}/artifacts/browser/package/build

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: packages/browser/e2e-tests/blob-report
          retention-days: 1

  merge-e2e-browser-reports:
    # Merge Playwright reports, even if some shards have failed
    if: ${{ !cancelled() }}
    needs: [e2e-browser]

    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.node-version-file }}
      - name: Install dependencies
        run: yarn install
        working-directory: packages/browser/e2e-tests

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/browser/e2e-tests/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: yarn playwright merge-reports --reporter html ./all-blob-reports
        working-directory: packages/browser/e2e-tests

      - name: Upload HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: packages/browser/e2e-tests/playwright-report
          retention-days: 14

  e2e-react:
    needs: wait-for-build

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.node-version-file }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stlite-react
          path: ${{ runner.temp }}/artifacts/react
          run-id: ${{ needs.wait-for-build.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact contents
        uses: ./.github/actions/verify-only-file
        with:
          directory: ${{ runner.temp }}/artifacts/react
          filename: package.tgz

      - name: Verify artifact attestation
        uses: ./.github/actions/verify-artifact-attestation
        with:
          filepath: ${{ runner.temp }}/artifacts/react/package.tgz
          expected-workflow-file: .github/workflows/test-build.yml
          expected-ref: ${{ github.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract package and set up for demo build
        run: |
          tar xzvf ${{ runner.temp }}/artifacts/react/package.tgz -C ${{ runner.temp }}/artifacts/react
          # Copy the built artifacts to packages/react/build so demos can resolve @stlite/react
          cp -r ${{ runner.temp }}/artifacts/react/package/build packages/react/build
          cp -r ${{ runner.temp }}/artifacts/react/package/vite-plugin/dist packages/react/vite-plugin/dist

      - name: Set up the e2e-tests environment
        run: yarn install
        working-directory: packages/react/e2e-tests

      - name: Build demos
        run: yarn build:demo
        working-directory: packages/react/e2e-tests
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      # Run tests in Playwright Docker container for consistent font rendering with local snapshots
      - name: Run the e2e-tests
        run: ./scripts/run-in-docker.sh
        working-directory: packages/react/e2e-tests

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-react-html-report--attempt-${{ github.run_attempt }}
          path: |
            packages/react/e2e-tests/playwright-report
            packages/react/e2e-tests/test-results/
          retention-days: 14

  e2e-desktop:
    needs: wait-for-build

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: read

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/init-all
        with:
          node-version-file: ${{ env.node-version-file }}
          install-node-modules: false
          protoc: false

      - run: cp -r packages/desktop/samples/basic ${{ runner.temp }}/sample_app

      - name: Download artifact into the temp dir
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stlite-desktop
          path: ${{ runner.temp }}/sample_app
          run-id: ${{ needs.wait-for-build.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install the tarball
        run: |
          npm install file:package.tgz
        working-directory: ${{ runner.temp }}/sample_app

      - run: npm run dump
        working-directory: ${{ runner.temp }}/sample_app

      # TODO: Run `yarn serve` and check if the app doesn't show any error.

      - name: Check if electron-builder works
        run: npm run app:dir
        working-directory: ${{ runner.temp }}/sample_app
