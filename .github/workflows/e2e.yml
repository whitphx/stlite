name: E2E Tests
run-name: E2E Tests for ${{ github.event.workflow_run.display_title || github.event.workflow_run.run_number }}

on:
  # This workflow is triggered by the `workflow_run` event following the `Test and Build` workflow.
  # It runs in the default-branch context (required for cross-workflow artifact downloads),
  # but each E2E job explicitly checks out the PR's head SHA so tests execute with the PR's code.
  # This file must NEVER reference deployment/publish secrets — `postbuild.yml` is the only
  # workflow permitted to hold those. Keeping E2E and secret-bearing jobs in separate files is
  # the security boundary that allows the E2E workflow to run PR code safely.
  workflow_run:
    workflows: ["Test and Build"]
    types:
      - completed

env:
  node-version-file: ".nvmrc"

permissions: {}

jobs:
  get-build-info:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.build-info.outputs.branch }}
      trigger-sha: ${{ steps.build-info.outputs.trigger-sha }}
      head-sha: ${{ steps.build-info.outputs.head-sha }}
      pr-number: ${{ steps.build-info.outputs.pr-number }}
    steps:
      - name: Download build info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Read build info
        id: build-info
        run: |
          echo "branch=$(cat branch)"
          echo "branch=$(cat branch)" >> $GITHUB_OUTPUT
          echo "trigger-sha=$(cat trigger-sha)"
          echo "trigger-sha=$(cat trigger-sha)" >> $GITHUB_OUTPUT
          echo "head-sha=$(cat head-sha)"
          echo "head-sha=$(cat head-sha)" >> $GITHUB_OUTPUT
          echo "pr-number=$(cat pr-number)"
          echo "pr-number=$(cat pr-number)" >> $GITHUB_OUTPUT

  e2e-browser:
    needs: get-build-info

    permissions:
      contents: read
      statuses: write

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ needs.get-build-info.outputs.head-sha }}

    - name: Enable Corepack
      run: corepack enable
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ${{ env.node-version-file }}

    - name: Set up the e2e-tests environment
      run: |
        yarn install
        yarn install:browsers
      working-directory: packages/browser/e2e-tests

    - name: Build demos
      run: yarn build:demo
      working-directory: packages/browser/e2e-tests
      env:
        NODE_OPTIONS: "--max-old-space-size=6144"

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: stlite-browser
        path: ${{ runner.temp }}/artifacts/browser
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - run: tar xzvf package.tgz
      working-directory: ${{ runner.temp }}/artifacts/browser

    - name: Run the e2e-tests
      run: yarn test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      working-directory: packages/browser/e2e-tests
      env:
        BUILD_DIR: ${{ runner.temp }}/artifacts/browser/package/build

    - name: Update commit status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          STATE="success"
        else
          STATE="failure"
        fi
        gh api repos/${{ github.repository }}/statuses/${HEAD_SHA} \
          -X POST \
          -f state=${STATE} \
          -f context=${{ github.job }} \
          -f target_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HEAD_SHA: ${{ needs.get-build-info.outputs.head-sha }}

    - name: Upload blob report to GitHub Actions Artifacts
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: blob-report-${{ matrix.shardIndex }}
        path: packages/browser/e2e-tests/blob-report
        retention-days: 1

  merge-e2e-browser-reports:
    # Merge Playwright reports, even if some shards have failed
    if: ${{ !cancelled() }}
    needs: [get-build-info, e2e-browser]

    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ needs.get-build-info.outputs.head-sha }}
    - name: Enable Corepack
      run: corepack enable
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ${{ env.node-version-file }}
    - name: Install dependencies
      run: yarn install
      working-directory: packages/browser/e2e-tests

    - name: Download blob reports from GitHub Actions Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: packages/browser/e2e-tests/all-blob-reports
        pattern: blob-report-*
        merge-multiple: true

    - name: Merge into HTML Report
      run: yarn playwright merge-reports --reporter html ./all-blob-reports
      working-directory: packages/browser/e2e-tests

    - name: Upload HTML report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: html-report--attempt-${{ github.run_attempt }}
        path: packages/browser/e2e-tests/playwright-report
        retention-days: 14

  e2e-react:
    needs: get-build-info

    permissions:
      contents: read
      statuses: write

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ needs.get-build-info.outputs.head-sha }}

    - name: Enable Corepack
      run: corepack enable
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ${{ env.node-version-file }}

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: stlite-react
        path: ${{ runner.temp }}/artifacts/react
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify artifact contents
      uses: ./.github/actions/verify-only-file
      with:
        directory: ${{ runner.temp }}/artifacts/react
        filename: package.tgz

    - name: Verify artifact attestation
      uses: ./.github/actions/verify-artifact-attestation
      with:
        filepath: ${{ runner.temp }}/artifacts/react/package.tgz
        expected-workflow-file: .github/workflows/test-build.yml
        expected-ref: ${{ needs.get-build-info.outputs.pr-number && format('refs/pull/{0}/merge', needs.get-build-info.outputs.pr-number) || format('refs/heads/{0}', needs.get-build-info.outputs.branch) }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract package and set up for demo build
      run: |
        tar xzvf ${{ runner.temp }}/artifacts/react/package.tgz -C ${{ runner.temp }}/artifacts/react
        # Copy the built artifacts to packages/react/build so demos can resolve @stlite/react
        cp -r ${{ runner.temp }}/artifacts/react/package/build packages/react/build
        cp -r ${{ runner.temp }}/artifacts/react/package/vite-plugin/dist packages/react/vite-plugin/dist

    - name: Set up the e2e-tests environment
      run: yarn install
      working-directory: packages/react/e2e-tests

    - name: Build demos
      run: yarn build:demo
      working-directory: packages/react/e2e-tests
      env:
        NODE_OPTIONS: "--max-old-space-size=6144"

    # Run tests in Playwright Docker container for consistent font rendering with local snapshots
    - name: Run the e2e-tests
      run: ./scripts/run-in-docker.sh
      working-directory: packages/react/e2e-tests

    - name: Update commit status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          STATE="success"
        else
          STATE="failure"
        fi
        gh api repos/${{ github.repository }}/statuses/${HEAD_SHA} \
          -X POST \
          -f state=${STATE} \
          -f context=${{ github.job }} \
          -f target_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HEAD_SHA: ${{ needs.get-build-info.outputs.head-sha }}

    - name: Upload HTML report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: e2e-react-html-report--attempt-${{ github.run_attempt }}
        path: |
          packages/react/e2e-tests/playwright-report
          packages/react/e2e-tests/test-results/
        retention-days: 14

  e2e-desktop:
    needs: get-build-info

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: read
      statuses: write

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ needs.get-build-info.outputs.head-sha }}

    - uses: ./.github/actions/init-all
      with:
        node-version-file: ${{ env.node-version-file }}
        install-node-modules: false
        protoc: false

    - run: cp -r packages/desktop/samples/basic ${{ runner.temp }}/sample_app

    - name: Download artifact into the temp dir
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: stlite-desktop
        path: ${{ runner.temp }}/sample_app
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install the tarball
      run: |
        npm install file:package.tgz
      working-directory: ${{ runner.temp }}/sample_app

    - run: npm run dump
      working-directory: ${{ runner.temp }}/sample_app

    # TODO: Run `yarn serve` and check if the app doesn't show any error.

    - name: Check if electron-builder works
      run: npm run app:dir
      working-directory: ${{ runner.temp }}/sample_app

    - name: Update commit status
      if: always()
      shell: bash
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          STATE="success"
        else
          STATE="failure"
        fi
        gh api repos/${{ github.repository }}/statuses/${HEAD_SHA} \
          -X POST \
          -f state=${STATE} \
          -f context='${{ github.job }} (${{ matrix.os }})' \
          -f target_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HEAD_SHA: ${{ needs.get-build-info.outputs.head-sha }}
