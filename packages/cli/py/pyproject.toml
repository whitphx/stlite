[project]
name = "stlite-cli"
version = "0.0.0"
description = "Command-line tools for Stlite"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
  { name = "Yuichiro Tachibana (Tsuchiya)", email = "t.yic.yt@gmail.com" },
]
dependencies = ["betterproto>=1.2.5,<2", "click>=8.1"]

[project.scripts]
stlite = "stlite_cli.cli:main"

[dependency-groups]
dev = [
  "betterproto[compiler]>=1.2.5,<2",
  "pyright>=1.1.384",
  "pytest>=8.3.3",
  "ruff>=0.6.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff.lint]
extend-select = ["I"]

# Pin first-party detection so ruff's import sorter doesn't depend on whether
# `_proto/` (generated by `make cli-py-proto`) or `_runtime_version.py`
# (generated by `make cli-py-runtime-version`) happen to exist on disk when
# ruff runs. Without this, CI fails I001 on a tests file because the lint
# step runs *before* those generators in the test-cli job.
[tool.ruff.lint.isort]
known-first-party = ["stlite_cli"]

[tool.pyright]
include = ["stlite_cli"]
# Type-check against the declared minimum so we catch accidentally adding
# 3.11+ syntax (e.g. `tomllib`, `Self`, `X | Y` unions become more
# strictly checked here) before users on 3.10 hit it at runtime.
pythonVersion = "3.10"
